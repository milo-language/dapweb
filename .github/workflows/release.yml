name: release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: darwin-arm64
          - os: ubuntu-22.04
            target: linux-x64
          - os: ubuntu-22.04-arm
            target: linux-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2

      # Build on 22.04, not 24.04: a binary links against the build host's glibc,
      # and 24.04's 2.39 floor makes releases refuse to start on Debian bookworm
      # (2.36). 22.04 gives 2.35, which covers bookworm and Ubuntu 22.04+.
      #
      # But 22.04 only ships clang up to 15, and milo needs 16+: its IR uses the
      # element-type-free intrinsic mangling (@llvm.memcpy.p0.p0.i64) that landed
      # in LLVM 16. clang 15 accepts opaque `ptr` as a type but rejects those
      # names. So pull clang 18 from apt.llvm.org.
      - name: install clang 18 (linux)
        if: runner.os == 'Linux'
        run: |
          wget -qO llvm.sh https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 18
          # milo probes /usr/bin/clang FIRST, so the symlink has to move — adding
          # llvm-18 to PATH is not enough.
          sudo ln -sf /usr/bin/clang-18 /usr/bin/clang
          sudo ln -sf /usr/bin/clang++-18 /usr/bin/clang++
          clang --version | head -1

      - name: install milo
        run: |
          curl -fsSL -o milo.tar.gz \
            "https://github.com/milo-language/milo/releases/download/latest/milo-${{ matrix.target }}.tar.gz"
          tar xzf milo.tar.gz
          chmod +x milo
          echo "$PWD" >> "$GITHUB_PATH"

      # The HTTP/WebSocket layer links OpenSSL, so a plain build leaves the binary
      # needing libssl.so.3 and it will not start on a machine without it.
      - name: install openssl static archives
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            sudo apt-get update && sudo apt-get install -y libssl-dev
          else
            brew list openssl@3 >/dev/null 2>&1 || brew install openssl@3
          fi

      # Stamp build identity into the binary. `.version` is embedded via embedFile(),
      # so this must happen before the build; the committed value is "dev".
      - name: stamp version
        run: printf '%s (%s)' "$(git rev-parse --short HEAD)" "$(date -u +%Y-%m-%d)" > .version

      # Must run before `milo build`: the UI bundle is embedded via embedFile(),
      # so it has to exist on disk at compile time. A missing bundle fails the
      # build here rather than shipping a binary that 404s in the browser.
      - name: build web UI
        working-directory: src/web/ui
        run: |
          bun install --frozen-lockfile
          ./build.sh

      - name: build server
        run: milo build src/main.milo -o dapweb --release --static-deps

      - name: verify no openssl runtime dependency
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then deps=$(otool -L dapweb); else deps=$(ldd dapweb); fi
          if printf '%s' "$deps" | grep -qiE 'libssl|libcrypto'; then
            echo "ERROR: dapweb still needs OpenSSL at runtime"; printf '%s\n' "$deps"; exit 1
          fi
          echo "dapweb is OpenSSL-free"

      - name: smoke test
        run: ./dapweb --help > /dev/null && echo "binary runs"

      - name: package
        run: |
          mkdir -p "pkg/dapweb-${{ matrix.target }}"
          cp dapweb README.md "pkg/dapweb-${{ matrix.target }}/"
          tar czf "dapweb-${{ matrix.target }}.tar.gz" -C pkg "dapweb-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dapweb-${{ matrix.target }}
          path: dapweb-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - run: ls -lh dapweb-*.tar.gz
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Rolling release from the latest passing commit on main.

            Install (curl, not the browser — a browser download carries macOS's
            quarantine flag, which kills and trashes the unsigned binary):

            ```
            P=$(uname -s | tr A-Z a-z)-$(uname -m | sed 's/x86_64/x64/;s/aarch64/arm64/')
            curl -fsSL https://github.com/milo-language/dapweb/releases/download/latest/dapweb-$P.tar.gz | tar xz
            cd dapweb-$P && ./dapweb web
            ```
          prerelease: false
          make_latest: true
          files: dapweb-*.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
